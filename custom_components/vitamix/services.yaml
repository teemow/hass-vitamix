cancel:
  name: Cancel program
  description: >-
    Send the official "cancel current program" packet to a Vitamix
    blender. Idempotent if the device is already idle.
  target:
    device:
      integration: vitamix

load_program:
  name: Load saved program
  description: >-
    Arm one of the blender's built-in saved program slots
    (e.g. Smoothie / Frozen Dessert / Spreads). Whether the motor also
    spins immediately depends on whether the dial is in an armed
    position; on an idle device the slot is just primed.
  target:
    device:
      integration: vitamix
  fields:
    slot:
      name: Program slot
      description: 1-indexed saved-program slot (1 = first preset).
      required: true
      example: 1
      selector:
        number:
          min: 1
          max: 16
          step: 1
          mode: box

set_motor_speed:
  name: Set motor speed
  description: >-
    Run the motor at a fixed Variable-speed (0..10). Stages a 1-step
    custom program in the panel scratch buffer and fires it. Calling
    again while the motor is running re-stages the buffer for live
    speed changes.
  target:
    device:
      integration: vitamix
  fields:
    speed:
      name: Speed
      description: >-
        0..10 on the variable-speed dial. 0 stops the motor (same as
        the cancel service); 10 is full speed.
      required: true
      example: 5
      selector:
        number:
          min: 0
          max: 10
          step: 1
          mode: slider
    duration:
      name: Duration (seconds)
      description: >-
        How long the motor should run before the firmware times it
        out. Defaults to 65535 (~18h, used as "run forever" sentinel).
      required: false
      default: 65535
      example: 60
      selector:
        number:
          min: 1
          max: 65535
          step: 1
          mode: box

start_motor:
  name: Start motor
  description: >-
    Convenience wrapper around set_motor_speed. Defaults to a gentle
    Variable-5 so a bare invocation can't launch ingredients out of
    an open container.
  target:
    device:
      integration: vitamix
  fields:
    speed:
      name: Speed
      description: 1..10 on the variable-speed dial.
      required: false
      default: 5
      example: 5
      selector:
        number:
          min: 1
          max: 10
          step: 1
          mode: slider
    duration:
      name: Duration (seconds)
      required: false
      default: 65535
      example: 60
      selector:
        number:
          min: 1
          max: 65535
          step: 1
          mode: box

stop_motor:
  name: Stop motor
  description: >-
    Stop the motor. Equivalent to cancel; kept as a separate service
    so dashboards/automations can express intent unambiguously.
  target:
    device:
      integration: vitamix

play_melody:
  name: Play melody
  description: >-
    Play a sequence of (speed, duration) "notes" by re-staging a
    1-step custom program for each note and sleeping for its dwell
    time. Holds a single BLE connection open for the whole tune.
  target:
    device:
      integration: vitamix
  fields:
    notes:
      name: Notes
      description: >-
        List of {speed, duration} pairs. Speed is 0..10 (0 = silence /
        stop), duration is in seconds (fractions allowed).
      required: true
      example: |
        - speed: 4
          duration: 0.3
        - speed: 8
          duration: 0.6
      selector:
        object:
    gap:
      name: Gap between notes (seconds)
      description: >-
        Optional silence inserted between notes (motor stops). Set to
        0 for back-to-back notes.
      required: false
      default: 0.0
      example: 0.05
      selector:
        number:
          min: 0
          max: 5
          step: 0.05
          mode: box
